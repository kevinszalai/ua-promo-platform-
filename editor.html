<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor de Flyer — Universal Assistance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="assets/logo-ua-white.png" alt="Universal Assistance" style="height:32px;width:auto;" />
  </div>
  <div class="header-right">
    <a href="index.html" class="btn-header">← Inicio</a>
  </div>
</header>

<div class="subnav">
  <div class="subnav-label">
    <span class="subnav-dot"></span>
    Editor de Promos
  </div>
</div>

<div class="container">

  <div class="page-heading">
    <h1 id="pageTitle">Editá tu flyer</h1>
    <p>Completá los campos y el preview se actualiza en tiempo real.</p>
  </div>

  <div class="stepper-card">
    <div class="step done">
      <div class="step-num">✓</div>
      <span class="step-label">Diseño seleccionado</span>
    </div>
    <div class="step-line done"></div>
    <div class="step active">
      <div class="step-num">2</div>
      <span class="step-label">Editá los campos</span>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      <span class="step-label">Descargá</span>
    </div>
  </div>

  <div class="editor-layout">

    <div>
      <div class="card" style="margin-bottom:1.25rem;">
        <div class="card-header">
          <div class="card-header-accent"></div>
          <span class="card-title">Datos de la promoción</span>
        </div>
        <div class="card-body" id="fieldsContainer">
          <div class="skeleton" style="height:70px;margin-bottom:1rem;"></div>
          <div class="skeleton" style="height:70px;margin-bottom:1rem;"></div>
          <div class="skeleton" style="height:70px;"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-header-accent"></div>
          <span class="card-title">Descargar</span>
        </div>
        <div class="card-body">
          <div class="btn-group">
            <button class="btn-primary" id="btnPNG">⬇ Descargar PNG</button>
          </div>
          <div class="live-pill">
            <span class="live-dot"></span>
            Preview en tiempo real activo
          </div>
        </div>
      </div>
    </div>

    <div class="preview-sticky">
      <div class="card">
        <div class="card-header">
          <div class="card-header-accent"></div>
          <span class="card-title">Vista previa</span>
        </div>
        <div class="card-body" style="padding:1rem;">
          <div class="preview-wrap" id="previewWrap">
            <div class="preview-placeholder">
              <span style="font-size:2rem;">🖼</span>
              <span>Cargando preview...</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast" class="toast"><span class="toast-icon">✓</span><span id="toastMsg"></span></div>
<canvas id="exportCanvas" style="display:none;"></canvas>

<script>
const params     = new URLSearchParams(location.search);
const templateId = params.get('id') || params.get('local');
let svgText = '';
let config  = null;
let vals    = {};
let enabled = {};
let bebasFontBase64 = '';

function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function init() {
  if (!templateId) { location.href = 'index.html'; return; }

  const res     = await fetch('templates/catalog.json');
  const catalog = await res.json();
  config = catalog.find(t => t.id === templateId);
  if (!config) { location.href = 'index.html'; return; }

  document.getElementById('pageTitle').textContent = `Editá tu flyer — ${config.name}`;
  document.title = `${config.name} — UA Promos`;

  const svgRes = await fetch(config.file);
  const rawSvg = await svgRes.text();

  // Inject background image as base64 so canvas export works
  const bgUrl = config.backgroundUrl || 'templates/promo-bg.jpg';
  try {
    const imgRes = await fetch(bgUrl);
    const buf    = await imgRes.arrayBuffer();
    const bytes  = new Uint8Array(buf);
    let bin = '';
    bytes.forEach(b => bin += String.fromCharCode(b));
    const b64  = btoa(bin);
    const mime = imgRes.headers.get('content-type') || 'image/jpeg';
    svgText = rawSvg.replace(/(<image[^>]*xlink:href=")[^"]*("/), `$1data:${mime};base64,${b64}$2`);
  } catch(e) {
    svgText = rawSvg;
  }

  config.fields.forEach(f => {
    vals[f.id]    = '';
    enabled[f.id] = !f.optional;
  });

  renderFields();
  renderPreview();

  document.getElementById('btnPNG').disabled = true;
  document.getElementById('btnPNG').textContent = '⏳ Cargando fuente...';
  await preloadBebasFont();
  document.getElementById('btnPNG').textContent = '⬇ Descargar PNG';
  document.getElementById('btnPNG').disabled = false;
}

async function preloadBebasFont() {
  try {
    const res   = await fetch('assets/fonts/BebasNeue-Regular.woff2');
    const buf   = await res.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let bin = '';
    bytes.forEach(b => bin += String.fromCharCode(b));
    bebasFontBase64 = btoa(bin);
  } catch(e) { console.warn('Font load error', e); }
}

function renderFields() {
  const c = document.getElementById('fieldsContainer');
  c.innerHTML = '';
  config.fields.forEach(f => {
    const g = document.createElement('div');
    g.className = 'field-group';

    if (f.type === 'cuotas') {
      const isOn = enabled[f.id];
      g.innerHTML = `
        <div class="field-toggle-row">
          <label class="field-label" style="margin:0;">${f.label}</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-${f.id}" ${isOn ? 'checked' : ''} />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
        <div class="field-optional-body" id="body-${f.id}" style="${isOn ? '' : 'display:none;'}">
          <select id="f-${f.id}" ${isOn ? '' : 'disabled'}>
            ${Array.from({length:11},(_,i)=>`<option value="${i+2}">${i+2} cuotas sin interés</option>`).join('')}
          </select>
        </div>`;
      g.querySelector(`#toggle-${f.id}`).addEventListener('change', e => {
        enabled[f.id] = e.target.checked;
        const body = document.getElementById(`body-${f.id}`);
        const sel  = document.getElementById(`f-${f.id}`);
        if (e.target.checked) { body.style.display=''; sel.disabled=false; vals[f.id]=parseInt(sel.value); }
        else { body.style.display='none'; sel.disabled=true; vals[f.id]=''; }
        renderPreview();
      });
      g.querySelector(`#f-${f.id}`).addEventListener('change', e => { vals[f.id]=parseInt(e.target.value); renderPreview(); });
      if (!vals[f.id] && isOn) vals[f.id] = 3;

    } else if (f.optional) {
      const isOn = enabled[f.id];
      g.innerHTML = `
        <div class="field-toggle-row">
          <label class="field-label" style="margin:0;">${f.label}</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-${f.id}" ${isOn ? 'checked' : ''} />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
        <div class="field-optional-body" id="body-${f.id}" style="${isOn ? '' : 'display:none;'}">
          <input type="text" id="f-${f.id}" placeholder="${f.placeholder||''}" value="" autocomplete="off" maxlength="50" ${isOn ? '' : 'disabled'} />
          ${f.hint ? `<div class="field-hint">${f.hint}</div>` : ''}
        </div>`;
      g.querySelector(`#toggle-${f.id}`).addEventListener('change', e => {
        enabled[f.id] = e.target.checked;
        const body  = document.getElementById(`body-${f.id}`);
        const input = document.getElementById(`f-${f.id}`);
        if (e.target.checked) { body.style.display=''; input.disabled=false; input.focus(); }
        else { body.style.display='none'; input.disabled=true; vals[f.id]=''; input.value=''; }
        renderPreview();
      });
      g.querySelector(`#f-${f.id}`).addEventListener('input', e => { vals[f.id]=e.target.value; renderPreview(); });

    } else if (f.type === 'select') {
      g.innerHTML = `
        <label class="field-label" for="f-${f.id}">${f.label}</label>
        <select id="f-${f.id}">
          <option value="">— Seleccioná —</option>
          ${(f.options||[]).map(o=>`<option value="${o}">${o}</option>`).join('')}
        </select>
        ${f.hint ? `<div class="field-hint">${f.hint}</div>` : ''}`;
      g.querySelector(`#f-${f.id}`).addEventListener('change', e => { vals[f.id]=e.target.value; renderPreview(); });

    } else {
      g.innerHTML = `
        <label class="field-label" for="f-${f.id}">${f.label}</label>
        <input type="${f.type||'text'}" id="f-${f.id}"
          placeholder="${f.placeholder||''}" value="" autocomplete="off"
          ${f.min ? `min="${f.min}"` : ''} ${f.max ? `max="${f.max}"` : ''}
          ${f.id==='descuento' ? 'maxlength="2"' : ''} />
        ${f.hint ? `<div class="field-hint">${f.hint}</div>` : ''}`;
      g.querySelector(`#f-${f.id}`).addEventListener('input', e => {
        let v = e.target.value;
        if (v!=='' && f.max && Number(v)>f.max) { v=String(f.max); e.target.value=v; }
        if (v!=='' && f.min && Number(v)<f.min) { v=String(f.min); e.target.value=v; }
        vals[f.id] = v;
        renderPreview();
        if (Object.values(vals).some(x=>x)) {
          document.getElementById('step3').classList.add('active');
          document.getElementById('line2').classList.add('done');
        }
      });
    }
    c.appendChild(g);
  });
}

function applyEdits(src, embedFont = false) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(src, 'image/svg+xml');

  if (embedFont && bebasFontBase64) {
    const styleEl = doc.querySelector('style');
    if (styleEl) {
      styleEl.textContent = `@font-face{font-family:'Bebas Neue';src:url('data:font/woff2;base64,${bebasFontBase64}') format('woff2');}\n` + styleEl.textContent;
    }
  }

  (config.hideSelectors||[]).forEach(sel => {
    doc.querySelectorAll(sel).forEach(el => el.setAttribute('visibility','hidden'));
  });

  function setField(selector, value) {
    const tspan = doc.querySelector(selector);
    if (!tspan) return;
    tspan.textContent = value || '';
    if (value) {
      const textEl = tspan.closest('text') || tspan.parentElement;
      if (textEl) textEl.setAttribute('style', (textEl.getAttribute('style')||'') + '; font-family: "Bebas Neue", sans-serif !important;');
    }
  }

  config.fields.forEach(f => {
    if (f.type==='cuotas' || f.id==='beneficio2') return;
    if (!f.selector) return;
    setField(f.selector, (f.optional && !enabled[f.id]) ? '' : (vals[f.id]||''));
  });

  const cuotasOn = enabled['cuotas'] && vals['cuotas'];
  const bene2Val = (enabled['beneficio2'] && vals['beneficio2']) ? vals['beneficio2'] : 'EN ASISTENCIA AL VIAJERO';

  if (cuotasOn) {
    setField(config.selectorCuotas,    `+ ${vals['cuotas']} CUOTAS SIN INTERES`);
    setField(config.selectorBeneficio2, bene2Val);
  } else {
    setField(config.selectorCuotas,    bene2Val);
    setField(config.selectorBeneficio2, '');
  }

  (config.bebasSelectors||[]).forEach(sel => {
    doc.querySelectorAll(sel).forEach(el => {
      el.setAttribute('style', (el.getAttribute('style')||'') + '; font-family: "Bebas Neue", sans-serif !important;');
    });
  });

  return new XMLSerializer().serializeToString(doc);
}

function renderPreview() {
  const modified = applyEdits(svgText, false);
  const wrap = document.getElementById('previewWrap');
  wrap.innerHTML = modified;
  const svgEl = wrap.querySelector('svg');
  if (svgEl) {
    svgEl.style.width  = '100%';
    svgEl.style.height = 'auto';
    svgEl.removeAttribute('width');
    svgEl.removeAttribute('height');
  }
}

document.getElementById('btnPNG').addEventListener('click', () => {
  if (!vals['descuento'] || Number(vals['descuento']) < 1) {
    toast('⚠ Completá el porcentaje de descuento para descargar');
    const inp = document.getElementById('f-descuento');
    inp.focus(); inp.style.borderColor = '#e05c2a';
    setTimeout(() => inp.style.borderColor = '', 2500);
    return;
  }

  const withFont = applyEdits(svgText, true);
  const blob = new Blob([withFont], { type: 'image/svg+xml' });
  const url  = URL.createObjectURL(blob);
  const img  = new Image();

  img.onload = () => {
    const canvas = document.getElementById('exportCanvas');
    const vb = document.querySelector('#previewWrap svg')?.getAttribute('viewBox') || '0 0 600 768';
    const [,,w,h] = vb.split(' ').map(Number);
    const scale = 2;
    canvas.width  = (img.naturalWidth  || w) * scale;
    canvas.height = (img.naturalHeight || h) * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    canvas.toBlob(pngBlob => {
      const pu = URL.createObjectURL(pngBlob);
      const a  = document.createElement('a');
      a.href = pu; a.download = `${templateId}-editado.png`; a.click();
      URL.revokeObjectURL(pu);
      toast('PNG descargado ✓');
    }, 'image/png');
  };
  img.onerror = () => { URL.revokeObjectURL(url); toast('Error generando PNG'); };
  img.src = url;
});

init().catch(console.error);
</script>
</body>
</html>
