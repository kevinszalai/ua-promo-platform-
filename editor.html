<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor de Flyer — Universal Assistance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="assets/logo-ua-white.png" alt="Universal Assistance" style="height:32px;width:auto;" />
  </div>
  <div class="header-right">
    <a href="index.html" class="btn-header">← Inicio</a>
  </div>
</header>

<div class="subnav">
  <div class="subnav-label">
    <span class="subnav-dot"></span>
    Editor de Promos
  </div>
</div>

<div class="container">
  <div class="page-heading">
    <h1 id="pageTitle">Editá tu flyer</h1>
    <p>Completá los campos y el preview se actualiza en tiempo real.</p>
  </div>

  <div class="stepper-card">
    <div class="step done">
      <div class="step-num">✓</div>
      <span class="step-label">Diseño seleccionado</span>
    </div>
    <div class="step-line done"></div>
    <div class="step active">
      <div class="step-num">2</div>
      <span class="step-label">Editá los campos</span>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      <span class="step-label">Descargá</span>
    </div>
  </div>

  <div class="editor-layout">
    <div>
      <div class="card" style="margin-bottom:1.25rem;">
        <div class="card-header">
          <div class="card-header-accent"></div>
          <span class="card-title">Datos de la promoción</span>
        </div>
        <div class="card-body" id="fieldsContainer">
          <div class="skeleton" style="height:70px;margin-bottom:1rem;"></div>
          <div class="skeleton" style="height:70px;margin-bottom:1rem;"></div>
          <div class="skeleton" style="height:70px;"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-header-accent"></div>
          <span class="card-title">Descargar</span>
        </div>
        <div class="card-body">
          <div class="btn-group">
            <button class="btn-primary" id="btnPNG" disabled>⏳ Cargando...</button>
          </div>
          <div class="live-pill">
            <span class="live-dot"></span>
            Preview en tiempo real activo
          </div>
        </div>
      </div>
    </div>

    <div class="preview-sticky">
      <div class="card">
        <div class="card-header">
          <div class="card-header-accent"></div>
          <span class="card-title">Vista previa</span>
        </div>
        <div class="card-body" style="padding:1rem;">
          <div class="preview-wrap" id="previewWrap">
            <div class="preview-placeholder">
              <span style="font-size:2rem;">🖼</span>
              <span>Cargando preview...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"><span class="toast-icon">✓</span><span id="toastMsg"></span></div>
<canvas id="exportCanvas" style="display:none;"></canvas>

<script type="module">
import { initializeApp }           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { firebaseConfig, DEFAULT_FIELDS, SVG_CONFIG } from './js/firebase-config.js';

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const params   = new URLSearchParams(location.search);
const designId = params.get('id');

let svgText         = '';
let config          = null;
let vals            = {};
let enabled         = {};
let bebasFontBase64 = '';
let bgUrl           = 'templates/promo-bg.jpg';

function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function init() {
  if (!designId) { location.href = 'index.html'; return; }

  const snap = await getDoc(doc(db, 'designs', designId));
  if (!snap.exists()) { location.href = 'index.html'; return; }
  config = { id: snap.id, ...snap.data() };

  if (!config.fields)             config.fields             = DEFAULT_FIELDS;
  if (!config.bebasSelectors)     config.bebasSelectors     = SVG_CONFIG.bebasSelectors;
  if (!config.hideSelectors)      config.hideSelectors      = SVG_CONFIG.hideSelectors;
  if (!config.selectorCuotas)     config.selectorCuotas     = SVG_CONFIG.selectorCuotas;
  if (!config.selectorBeneficio2) config.selectorBeneficio2 = SVG_CONFIG.selectorBeneficio2;

  document.getElementById('pageTitle').textContent = `Editá tu flyer — ${config.name}`;
  document.title = `${config.name} — UA Promos`;

  // Load SVG and font in parallel; background may already be in Firestore as base64
  const [svgRes, fontRes] = await Promise.all([
    fetch('templates/promo-mx.svg'),
    fetch('assets/fonts/BebasNeue-Regular.woff2')
  ]);
  const rawSvg  = await svgRes.text();
  const fontBuf = await fontRes.arrayBuffer();
  bebasFontBase64 = bufToBase64(fontBuf);

  let bgDataUrl = config.backgroundData || null;
  if (!bgDataUrl) {
    const fallback = config.backgroundUrl || 'templates/promo-bg.jpg';
    const imgRes  = await fetch(fallback);
    const imgBuf  = await imgRes.arrayBuffer();
    const imgMime = imgRes.headers.get('content-type') || 'image/jpeg';
    bgDataUrl = `data:${imgMime};base64,${bufToBase64(imgBuf)}`;
  }

  svgText = rawSvg.replace(/(<image[^>]*)(xlink:href="[^"]*")/g,
    `$1xlink:href="${bgDataUrl}" href="${bgDataUrl}"`);

  config.fields.forEach(f => { vals[f.id] = ''; enabled[f.id] = !f.optional; });

  renderFields();
  renderPreview();

  const btn = document.getElementById('btnPNG');
  btn.textContent = '⬇ Descargar PNG';
  btn.disabled = false;
}

function renderFields() {
  const c = document.getElementById('fieldsContainer');
  c.innerHTML = '';
  config.fields.forEach(f => {
    const g = document.createElement('div');
    g.className = 'field-group';

    if (f.type === 'cuotas') {
      const isOn = enabled[f.id];
      g.innerHTML = `
        <div class="field-toggle-row">
          <label class="field-label" style="margin:0;">${f.label}</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-${f.id}" ${isOn?'checked':''} />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
        <div class="field-optional-body" id="body-${f.id}" style="${isOn?'':'display:none;'}">
          <select id="f-${f.id}" ${isOn?'':'disabled'}>
            ${Array.from({length:11},(_,i)=>`<option value="${i+2}">${i+2} cuotas sin interés</option>`).join('')}
          </select>
        </div>`;
      g.querySelector(`#toggle-${f.id}`).addEventListener('change', e => {
        enabled[f.id] = e.target.checked;
        const body=document.getElementById(`body-${f.id}`), sel=document.getElementById(`f-${f.id}`);
        if(e.target.checked){body.style.display='';sel.disabled=false;vals[f.id]=parseInt(sel.value);}
        else{body.style.display='none';sel.disabled=true;vals[f.id]='';}
        renderPreview();
      });
      g.querySelector(`#f-${f.id}`).addEventListener('change', e=>{vals[f.id]=parseInt(e.target.value);renderPreview();});
      if(!vals[f.id]&&isOn) vals[f.id]=3;

    } else if (f.optional) {
      const isOn = enabled[f.id];
      g.innerHTML = `
        <div class="field-toggle-row">
          <label class="field-label" style="margin:0;">${f.label}</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-${f.id}" ${isOn?'checked':''} />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
        <div class="field-optional-body" id="body-${f.id}" style="${isOn?'':'display:none;'}">
          <input type="text" id="f-${f.id}" placeholder="${f.placeholder||''}" value="" autocomplete="off" maxlength="50" ${isOn?'':'disabled'} />
          ${f.hint?`<div class="field-hint">${f.hint}</div>`:''}
        </div>`;
      g.querySelector(`#toggle-${f.id}`).addEventListener('change', e=>{
        enabled[f.id]=e.target.checked;
        const body=document.getElementById(`body-${f.id}`),input=document.getElementById(`f-${f.id}`);
        if(e.target.checked){body.style.display='';input.disabled=false;input.focus();}
        else{body.style.display='none';input.disabled=true;vals[f.id]='';input.value='';}
        renderPreview();
      });
      g.querySelector(`#f-${f.id}`).addEventListener('input', e=>{vals[f.id]=e.target.value;renderPreview();});

    } else if (f.type === 'select') {
      g.innerHTML = `
        <label class="field-label" for="f-${f.id}">${f.label}</label>
        <select id="f-${f.id}">
          <option value="">— Seleccioná —</option>
          ${(f.options||[]).map(o=>`<option value="${o}">${o}</option>`).join('')}
        </select>
        ${f.hint?`<div class="field-hint">${f.hint}</div>`:''}`;
      g.querySelector(`#f-${f.id}`).addEventListener('change', e=>{vals[f.id]=e.target.value;renderPreview();});

    } else {
      g.innerHTML = `
        <label class="field-label" for="f-${f.id}">${f.label}</label>
        <input type="${f.type||'text'}" id="f-${f.id}"
          placeholder="${f.placeholder||''}" value="" autocomplete="off"
          ${f.min?`min="${f.min}"`:''} ${f.max?`max="${f.max}"`:''} ${f.id==='descuento'?'maxlength="2"':''} />
        ${f.hint?`<div class="field-hint">${f.hint}</div>`:''}`;
      g.querySelector(`#f-${f.id}`).addEventListener('input', e=>{
        let v=e.target.value;
        if(v!==''&&f.max&&Number(v)>f.max){v=String(f.max);e.target.value=v;}
        if(v!==''&&f.min&&Number(v)<f.min){v=String(f.min);e.target.value=v;}
        vals[f.id]=v; renderPreview();
        if(Object.values(vals).some(x=>x)){document.getElementById('step3').classList.add('active');document.getElementById('line2').classList.add('done');}
      });
    }
    c.appendChild(g);
  });
}

function applyEdits(src, embedFont=false) {
  const doc2 = new DOMParser().parseFromString(src, 'image/svg+xml');
  if(embedFont&&bebasFontBase64){
    const st=doc2.querySelector('style');
    if(st) st.textContent=`@font-face{font-family:'Bebas Neue';src:url('data:font/woff2;base64,${bebasFontBase64}') format('woff2');}\n`+st.textContent;
  }
  (config.hideSelectors||[]).forEach(sel=>doc2.querySelectorAll(sel).forEach(el=>el.setAttribute('visibility','hidden')));
  function setField(sel,val){
    const ts=doc2.querySelector(sel); if(!ts) return;
    ts.textContent=val||'';
    if(val){const te=ts.closest('text')||ts.parentElement;if(te)te.setAttribute('style',(te.getAttribute('style')||'')+'; font-family: "Bebas Neue", sans-serif !important;');}
  }
  config.fields.forEach(f=>{
    if(f.type==='cuotas'||f.id==='beneficio2') return;
    if(!f.selector) return;
    setField(f.selector,(f.optional&&!enabled[f.id])?'':(vals[f.id]||''));
  });
  const cuotasOn=enabled['cuotas']&&vals['cuotas'];
  const bene2Val=(enabled['beneficio2']&&vals['beneficio2'])?vals['beneficio2']:'EN ASISTENCIA AL VIAJERO';
  if(cuotasOn){setField(config.selectorCuotas,`+ ${vals['cuotas']} CUOTAS SIN INTERES`);setField(config.selectorBeneficio2,bene2Val);}
  else{setField(config.selectorCuotas,bene2Val);setField(config.selectorBeneficio2,'');}
  (config.bebasSelectors||[]).forEach(sel=>doc2.querySelectorAll(sel).forEach(el=>el.setAttribute('style',(el.getAttribute('style')||'')+'; font-family: "Bebas Neue", sans-serif !important;')));
  return new XMLSerializer().serializeToString(doc2);
}

function renderPreview() {
  const wrap = document.getElementById('previewWrap');
  wrap.innerHTML = applyEdits(svgText, false);
  const svgEl = wrap.querySelector('svg');
  if(svgEl){
    svgEl.removeAttribute('width');
    svgEl.removeAttribute('height');
    svgEl.style.width = '100%';
    svgEl.style.height = 'auto';
    svgEl.style.display = 'block';
  }
}

function bufToBase64(buf) {
  const bytes = new Uint8Array(buf);
  let b64 = '';
  const chunk = 8192;
  for (let i = 0; i < bytes.length; i += chunk) {
    b64 += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(b64);
}

document.getElementById('btnPNG').addEventListener('click', async () => {
  if(!vals['descuento']||Number(vals['descuento'])<1){
    toast('⚠ Completá el porcentaje de descuento para descargar');
    const inp=document.getElementById('f-descuento');
    inp.focus(); inp.style.borderColor='#e05c2a';
    setTimeout(()=>inp.style.borderColor='',2500); return;
  }

  const btn = document.getElementById('btnPNG');
  btn.disabled = true; btn.textContent = '⏳ Generando...';

  // Background already embedded as base64 in svgText — no extra fetch needed
  const exportSvg = applyEdits(svgText, true)
    .replace(/viewBox="[^"]*"/, 'viewBox="0 0 600 556"');

  const blob = new Blob([exportSvg],{type:'image/svg+xml'});
  const url  = URL.createObjectURL(blob);
  const img  = new Image();
  img.onload = ()=>{
    const canvas = document.getElementById('exportCanvas');
    const scale  = 3;
    canvas.width  = 600 * scale;
    canvas.height = 556 * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0, 600, 556);
    URL.revokeObjectURL(url);
    canvas.toBlob(pngBlob=>{
      const pu = URL.createObjectURL(pngBlob);
      const a  = document.createElement('a');
      a.href = pu; a.download = `${config.name.replace(/\s+/g,'-')}.png`; a.click();
      URL.revokeObjectURL(pu);
      btn.disabled = false; btn.textContent = '⬇ Descargar PNG';
      toast('PNG descargado ✓');
    },'image/png');
  };
  img.onerror=()=>{
    URL.revokeObjectURL(url);
    btn.disabled = false; btn.textContent = '⬇ Descargar PNG';
    toast('Error generando PNG');
  };
  img.src = url;
});

init().catch(e=>{console.error(e);location.href='index.html';});
</script>
</body>
</html>
