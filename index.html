<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor de Promos — Universal Assistance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="assets/logo-ua-white.png" alt="Universal Assistance" style="height:32px;width:auto;" />
  </div>
  <div class="header-right">
    <a href="admin.html" class="btn-header">⚙ Admin</a>
  </div>
</header>

<div class="subnav">
  <div class="subnav-label">
    <span class="subnav-dot"></span>
    Editor de Promos
  </div>
</div>

<div class="container">

  <div class="hero-card">
    <div>
      <h1>Editor de Flyers Promocionales</h1>
      <p>Seleccioná un diseño, editá los campos y descargalo listo para compartir.</p>
    </div>
    <span class="hero-card-tag">Equipo Comercial</span>
  </div>

  <div class="stepper-card">
    <div class="step active">
      <div class="step-num">1</div>
      <span class="step-label">Elegí un diseño</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-num">2</div>
      <span class="step-label">Editá los campos</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-num">3</div>
      <span class="step-label">Descargá</span>
    </div>
  </div>

  <p class="section-label">Diseños disponibles</p>
  <div id="templateGrid" class="template-grid">
    <div class="template-thumb"><div class="skeleton" style="height:160px;"></div><div class="skeleton" style="height:32px;margin:8px 12px;"></div></div>
    <div class="template-thumb"><div class="skeleton" style="height:160px;"></div><div class="skeleton" style="height:32px;margin:8px 12px;"></div></div>
    <div class="template-thumb"><div class="skeleton" style="height:160px;"></div><div class="skeleton" style="height:32px;margin:8px 12px;"></div></div>
  </div>

</div>

<div id="toast" class="toast"><span class="toast-icon">✓</span><span id="toastMsg"></span></div>

<script type="module">
import { initializeApp }                         from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs,
         orderBy, query }                        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { firebaseConfig }                        from './js/firebase-config.js';

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

async function loadDesigns() {
  const grid = document.getElementById('templateGrid');
  try {
    const q = query(collection(db, 'designs'), orderBy('createdAt', 'asc'));
    const snap = await getDocs(q);
    const designs = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (designs.length === 0) {
      grid.innerHTML = `<p style="color:var(--gray-text);font-size:13px;grid-column:1/-1;">Todavía no hay diseños. El administrador debe agregar uno.</p>`;
      return;
    }

    grid.innerHTML = '';
    designs.forEach(d => {
      const div = document.createElement('div');
      div.className = 'template-thumb';
      div.innerHTML = `
        ${d.backgroundUrl
          ? `<img src="${d.backgroundUrl}" alt="${d.name}" loading="lazy" />`
          : `<div style="height:160px;background:linear-gradient(135deg,#0d1b3e,#0a3d52);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:2rem;">🖼</div>`}
        <div class="template-thumb-label">${d.name}</div>
      `;
      div.addEventListener('click', () => {
        location.href = `editor.html?id=${encodeURIComponent(d.id)}`;
      });
      grid.appendChild(div);
    });
  } catch(e) {
    grid.innerHTML = `<p style="color:var(--gray-text);font-size:13px;">Error al cargar los diseños.</p>`;
    console.error(e);
  }
}
loadDesigns();
</script>
</body>
</html>
